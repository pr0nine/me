name: Update NetBird Image Tag

on:
  schedule:
    - cron: '0 0 */3 * *' # Runs automatically every 3 days
  workflow_dispatch:     # Allows you to click a button and run it manually

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: 🔎 Get current version from your repo
        id: get_current
        run: |
          CURRENT_VERSION=$(sed -n 's/^[[:space:]]*image:[[:space:]]*[^:]*:\(.*\)/\1/p' netbird/nb.yaml | tr -d '\r ')
          echo "Current version: $CURRENT_VERSION"
          
          echo "CURRENT_VERSION=$CURRENT_VERSION" >> $GITHUB_ENV

      - name: Fetch Latest NetBird Release
        id: get-version
        run: |
          # Query GitHub's API to find NetBird's absolute latest stable release tag
          LATEST_TAG=$(curl -s https://api.github.com/repos/netbirdio/netbird/releases/latest | jq -r '.tag_name | ltrimstr("v")')
          
          if [ "$LATEST_TAG" == "null" ] || [ -z "$LATEST_TAG" ]; then
            echo "ERROR: Failed to fetch release from GitHub API."
            exit 1
          fi

          if [ "$LATEST_TAG" == "$CURRENT_VERSION" ]; then
            echo "NetBird is already up to date ($LATEST_TAG). No action needed."
            exit 0
          fi
          
          echo "LATEST_VERSION=$LATEST_TAG" >> $GITHUB_ENV
          echo "Latest stable NetBird version found: $LATEST_TAG"

      - name: ✍️ Update netbird-version in nb.yaml
        # This step will only run if the previous step didn't exit early
        run: |
          sed -i "s|netbirdio/netbird:$CURRENT_VERSION|netbirdio/netbird:$LATEST_VERSION|g" netbird/nb.yaml

      - name: ⬆️ Commit new version file
        uses: devops-infra/action-commit-push@v1.0.3
        with:
          github_token: ${{ secrets.PAT_TOKEN }}
          commit_message: "update NetBird image to version ${{ env.LATEST_VERSION }}"
